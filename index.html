<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0B0906"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Recall"/>
<title>Kindle Recall</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Syne:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0906;--bg2:#141110;--bg3:#1C1916;
  --text:#EDE8DF;--mid:rgba(237,232,223,0.48);--dim:rgba(237,232,223,0.16);
  --amber:#C98A20;--amber-b:#E0A030;
  --rule:rgba(237,232,223,0.09);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.screen{display:none;flex-direction:column;height:100dvh}
.screen.active{display:flex}

#splash{align-items:center;justify-content:center;gap:6px}
.sp-word{font-family:'Fraunces',serif;font-optical-sizing:auto;font-size:80px;font-weight:700;letter-spacing:-3px;color:var(--text);animation:blurIn 0.9s cubic-bezier(0.22,1,0.36,1) both}
.sp-rule{width:48px;height:1px;background:var(--amber);animation:fadeUp 0.6s ease 0.5s both}
.sp-sub{font-family:'Syne',sans-serif;font-size:9px;font-weight:400;letter-spacing:0.26em;text-transform:uppercase;color:var(--mid);animation:fadeUp 0.6s ease 0.65s both}

#home{background:var(--bg);overflow:hidden}
.home-top{padding:54px 28px 0;display:flex;justify-content:space-between;align-items:flex-start}
.top-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;color:var(--mid)}
.streak{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--amber)}
.home-hero{padding:28px 28px 0}
.hero-big{font-family:'Fraunces',serif;font-optical-sizing:auto;font-size:clamp(46px,12vw,60px);font-weight:700;line-height:1.0;letter-spacing:-2px;color:var(--text);animation:heroIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.05s both}
.hero-big em{font-style:italic;font-weight:300;color:var(--mid)}
.home-rule{height:1px;background:var(--rule);margin:20px 28px 0}
.home-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px}
.list-item{display:flex;align-items:center;padding:22px 28px;gap:18px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.12s}
.list-item:active{background:var(--bg2)}
.list-item:nth-child(1){animation:lineIn 0.5s ease 0.12s both}
.list-item:nth-child(2){animation:lineIn 0.5s ease 0.20s both}
.list-item:nth-child(3){animation:lineIn 0.5s ease 0.28s both}
.li-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--dim);min-width:18px}
.li-body{flex:1;min-width:0}
.li-title{font-family:'Fraunces',serif;font-optical-sizing:auto;font-size:22px;font-weight:700;color:var(--text);line-height:1.1;letter-spacing:-0.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-title.ital{font-style:italic;font-weight:300;font-size:17px;line-height:1.3;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.li-meta{margin-top:5px;font-size:12px;font-weight:300;color:var(--mid);display:flex;align-items:center;gap:5px}
.li-dot{width:3px;height:3px;border-radius:50%;background:var(--amber);flex-shrink:0}
.li-arrow{font-size:16px;color:var(--dim);transition:all 0.15s;flex-shrink:0}
.list-item:active .li-arrow{transform:translateX(4px);color:var(--amber)}
.li-tag{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:3px 7px;border-radius:2px;flex-shrink:0}
.tag-w{background:rgba(201,138,32,0.15);color:var(--amber)}
.tag-q{background:rgba(237,232,223,0.06);color:var(--mid)}
.tag-c{background:rgba(80,180,120,0.12);color:#5CB87A}

.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,9,6,0.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--rule);display:flex;padding:10px 0 env(safe-area-inset-bottom,10px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 0;cursor:pointer;opacity:0.28;transition:opacity 0.15s}
.ni.active{opacity:1}
.ni-icon{font-size:18px}
.ni-pip{width:4px;height:4px;border-radius:50%;background:var(--amber);opacity:0;transition:opacity 0.2s}
.ni.active .ni-pip{opacity:1}

#recall{background:var(--bg);justify-content:space-between}
.rc-top{display:flex;align-items:center;justify-content:space-between;padding:52px 28px 12px}
.rc-back{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--mid);cursor:pointer;padding:8px 0;transition:color 0.15s}
.rc-back:active{color:var(--text)}
.rc-pills{display:flex;gap:6px;align-items:center}
.rc-pill{height:2px;border-radius:1px;transition:all 0.35s ease}
.rc-pill.done{background:var(--mid);width:20px}
.rc-pill.active{background:var(--amber);width:32px}
.rc-pill.todo{background:var(--dim);width:20px}
.rc-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 28px 8px}
.rc-type{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--amber);margin-bottom:24px}
.rc-word{font-family:'Fraunces',serif;font-optical-sizing:auto;font-weight:700;color:var(--text);letter-spacing:-1.5px;line-height:0.95;margin-bottom:10px}
.rc-word.sz-word{font-size:clamp(56px,16vw,78px)}
.rc-word.sz-quote{font-size:clamp(20px,5.5vw,28px);font-style:italic;font-weight:300;letter-spacing:-0.2px;line-height:1.5}
.rc-word.sz-concept{font-size:clamp(38px,10vw,54px)}
.rc-amber-bar{width:40px;height:2px;background:var(--amber);margin-bottom:22px}
.rc-phonetic{font-size:13px;font-weight:300;font-style:italic;color:var(--mid);margin-bottom:22px;margin-top:-6px}
.rc-def{font-size:15px;font-weight:300;color:var(--mid);line-height:1.75;max-width:360px}
.rc-source{margin-top:28px;padding-top:20px;border-top:1px solid var(--rule)}
.rc-book{font-family:'Fraunces',serif;font-size:14px;font-weight:300;font-style:italic;color:rgba(237,232,223,0.38)}
.rc-author{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);margin-top:3px}
.rc-btns{padding:12px 28px 44px;display:flex;flex-direction:column;gap:8px}
.btn-got{width:100%;padding:18px;border-radius:3px;border:none;background:var(--amber);color:#0B0906;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;transition:all 0.12s}
.btn-got:active{background:var(--amber-b);transform:scale(0.985)}
.btn-later{width:100%;padding:16px;border-radius:3px;border:1px solid var(--rule);background:transparent;color:var(--mid);font-family:'Syne',sans-serif;font-size:10px;font-weight:400;letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;transition:all 0.12s}
.btn-later:active{background:var(--bg2)}

#done{background:var(--bg);align-items:center;justify-content:center;text-align:center;padding:40px 32px;gap:0}
.done-eyebrow{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.24em;text-transform:uppercase;color:var(--amber);margin-bottom:12px;animation:fadeUp 0.5s ease both}
.done-h{font-family:'Fraunces',serif;font-optical-sizing:auto;font-size:54px;font-weight:700;color:var(--text);letter-spacing:-2px;line-height:1.0;animation:blurIn 0.6s ease 0.1s both}
.done-h em{font-style:italic;font-weight:300;color:var(--mid)}
.done-p{font-size:14px;font-weight:300;color:var(--mid);line-height:1.65;max-width:250px;margin:12px auto 32px;animation:fadeUp 0.5s ease 0.2s both}
.done-grid{display:flex;gap:1px;width:100%;margin-bottom:36px;animation:fadeUp 0.5s ease 0.3s both}
.done-block{flex:1;padding:20px 8px;border:1px solid var(--rule);text-align:center}
.done-block:first-child{border-radius:3px 0 0 3px}
.done-block:last-child{border-radius:0 3px 3px 0}
.done-n{font-family:'Fraunces',serif;font-size:42px;font-weight:700;color:var(--text);letter-spacing:-1px}
.done-nl{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);margin-top:4px}
.btn-done-home{padding:16px 48px;border-radius:3px;border:1px solid var(--rule);background:transparent;color:var(--mid);font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;animation:fadeUp 0.5s ease 0.4s both}
.btn-done-home:active{background:var(--bg2);color:var(--text)}

@keyframes blurIn{from{opacity:0;filter:blur(14px);transform:translateY(8px)}to{opacity:1;filter:blur(0);transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes heroIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes lineIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.blur-in{animation:blurIn 0.55s cubic-bezier(0.22,1,0.36,1) both}
.fade-in{animation:fadeUp 0.4s ease both}
</style>
</head>
<body>

<div class="screen active" id="splash">
  <div class="sp-word">Recall</div>
  <div class="sp-rule"></div>
  <div class="sp-sub">Your library, remembered</div>
</div>

<div class="screen" id="home">
  <div class="home-top">
    <div class="top-label" id="home-date">Today</div>
    <div class="streak">🔥 7-day streak</div>
  </div>
  <div class="home-hero">
    <div class="hero-big">3 things<br>to <em>remember</em><br>today.</div>
  </div>
  <div class="home-rule"></div>
  <div class="home-scroll" id="home-list"></div>
  <div class="bnav">
    <div class="ni active"><div class="ni-icon">📚</div><div class="ni-pip"></div></div>
    <div class="ni"><div class="ni-icon">🗂</div><div class="ni-pip"></div></div>
    <div class="ni"><div class="ni-icon">📈</div><div class="ni-pip"></div></div>
    <div class="ni"><div class="ni-icon">⚙️</div><div class="ni-pip"></div></div>
  </div>
</div>

<div class="screen" id="recall">
  <div class="rc-top">
    <div class="rc-back" onclick="showHome()">← Back</div>
    <div class="rc-pills" id="rc-pills"></div>
    <div style="width:48px"></div>
  </div>
  <div class="rc-main" id="rc-main"></div>
  <div class="rc-btns">
    <button class="btn-got" onclick="markGot()">Got it</button>
    <button class="btn-later" onclick="markLater()">Show me again later</button>
  </div>
</div>

<div class="screen" id="done">
  <div class="done-eyebrow">Session complete</div>
  <div class="done-h">Well<br><em>done.</em></div>
  <div class="done-p">You reviewed 3 items from your library. See you tomorrow.</div>
  <div class="done-grid">
    <div class="done-block"><div class="done-n" id="d-got">0</div><div class="done-nl">Remembered</div></div>
    <div class="done-block"><div class="done-n" id="d-later">0</div><div class="done-nl">To revisit</div></div>
    <div class="done-block"><div class="done-n">7</div><div class="done-nl">Day streak</div></div>
  </div>
  <button class="btn-done-home" onclick="showHome()">Back to home</button>
</div>

<script>
const ITEMS=[
  {type:'word',tag:'Word',word:'Compounding',phonetic:'/kəmˈpaʊndɪŋ/',def:'Small, consistent gains that multiply over time into extraordinary results. Applied to habits: 1% better every day compounds to 37× better over a year.',book:'Atomic Habits',author:'James Clear'},
  {type:'quote',tag:'Quote',word:'"We are what we repeatedly do. Excellence, then, is not an act, but a habit."',def:"Aristotle as framed by Durant — the philosophy that identity precedes outcome. You don't rise to your goals, you fall to your systems.",book:'Thinking, Fast and Slow',author:'Daniel Kahneman'},
  {type:'concept',tag:'Concept',word:'Availability Heuristic',def:"We judge the likelihood of events by how easily examples come to mind. Plane crashes feel more dangerous than car rides — not because they're more frequent, but because they're more vivid.",book:'Thinking, Fast and Slow',author:'Daniel Kahneman'}
];
let cur=0,got=0,later=0;
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const d=new Date();
document.getElementById('home-date').textContent=`${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}`;

function buildList(){
  const tagMap={word:'tag-w',quote:'tag-q',concept:'tag-c'};
  document.getElementById('home-list').innerHTML=ITEMS.map((item,i)=>`
    <div class="list-item" onclick="startRecall(${i})">
      <div class="li-num">0${i+1}</div>
      <div class="li-body">
        <div class="li-title${item.type==='quote'?' ital':''}">${item.word}</div>
        <div class="li-meta"><div class="li-dot"></div>${item.book} · ${item.author}</div>
      </div>
      <div class="li-tag ${tagMap[item.type]}">${item.tag}</div>
      <div class="li-arrow">→</div>
    </div>`).join('');
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showHome(){show('home');buildList()}

function startRecall(startAt){
  cur=startAt||0;got=0;later=0;
  show('recall');renderCard();renderPills();
}

function renderPills(){
  document.getElementById('rc-pills').innerHTML=ITEMS.map((_,i)=>{
    let c=i<cur?'done':i===cur?'active':'todo';
    return `<div class="rc-pill ${c}"></div>`;
  }).join('');
}

function renderCard(){
  const item=ITEMS[cur];
  const szMap={word:'sz-word',quote:'sz-quote',concept:'sz-concept'};
  const m=document.getElementById('rc-main');
  m.innerHTML=`
    <div class="rc-type fade-in">${item.tag}</div>
    <div class="rc-word ${szMap[item.type]} blur-in">${item.word}</div>
    ${item.phonetic?`<div class="rc-phonetic fade-in">${item.phonetic}</div>`:''}
    <div class="rc-amber-bar fade-in"></div>
    <div class="rc-def fade-in">${item.def}</div>
    <div class="rc-source fade-in">
      <div class="rc-book">${item.book}</div>
      <div class="rc-author">${item.author}</div>
    </div>`;
  m.querySelectorAll('.fade-in,.blur-in').forEach((el,i)=>{el.style.animationDelay=`${i*0.07}s`});
}

function next(){cur++;if(cur>=ITEMS.length){document.getElementById('d-got').textContent=got;document.getElementById('d-later').textContent=later;show('done')}else{renderCard();renderPills()}}
function markGot(){got++;next()}
function markLater(){later++;next()}

buildList();
setTimeout(()=>{document.getElementById('splash').classList.remove('active');show('home')},2000);
</script>
</body>
</html>
